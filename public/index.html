<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Void — Messenger</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0c0c0e;
            --surface: #131316;
            --surface2: #1a1a1f;
            --surface3: #212126;
            --border: rgba(255,255,255,0.06);
            --border-hover: rgba(255,255,255,0.1);
            --accent: #6b8afd;
            --accent-dim: rgba(107,138,253,0.12);
            --accent-glow: rgba(107,138,253,0.2);
            --text: #e8e8f0;
            --text-2: #8888a0;
            --text-3: #4a4a60;
            --sent-bg: #6b8afd;
            --received-bg: #1e1e24;
            --danger: #f05050;
            --green: #40c074;
            --radius: 16px;
            --radius-sm: 10px;
            --transition: 0.18s ease;
        }

        [data-theme="light"] {
            --bg: #f0f0f5;
            --surface: #ffffff;
            --surface2: #f4f4f8;
            --surface3: #e8e8ef;
            --border: rgba(0,0,0,0.07);
            --border-hover: rgba(0,0,0,0.13);
            --text: #1a1a2e;
            --text-2: #6b6b88;
            --text-3: #aaaabc;
            --received-bg: #ebebf3;
            --danger: #e03c3c;
            --green: #28a85c;
        }

        body { transition: background 0.3s ease, color 0.3s ease; }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }


        /* ── AUTH SCREEN ─────────────────────────────── */
        .auth-screen {
            position: fixed; inset: 0;
            background: var(--bg);
            display: flex; justify-content: center; align-items: center;
            z-index: 9999;
            transition: opacity 0.35s ease;
        }
        .auth-screen.fade-out { opacity: 0; pointer-events: none; }

        .auth-card {
            width: 360px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 36px 32px 28px;
        }
        .auth-logo {
            font-family: 'DM Mono', monospace;
            font-size: 1.4rem;
            margin-bottom: 6px;
            color: var(--text);
        }
        .auth-logo span { color: var(--accent); }
        .auth-tagline {
            font-size: 0.8rem;
            color: var(--text-2);
            margin-bottom: 28px;
        }
        .auth-tabs {
            display: flex;
            background: var(--surface2);
            border-radius: var(--radius-sm);
            padding: 3px;
            margin-bottom: 22px;
            gap: 3px;
        }
        .auth-tab {
            flex: 1; text-align: center;
            padding: 8px; border-radius: 8px;
            font-size: 0.84rem; font-weight: 500;
            cursor: pointer;
            color: var(--text-2);
            transition: all var(--transition);
            user-select: none;
        }
        .auth-tab.active {
            background: var(--surface3);
            color: var(--text);
        }
        .auth-field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
        .auth-field label { font-size: 0.73rem; color: var(--text-2); font-weight: 500; }
        .auth-field input {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 10px 13px;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 0.88rem;
            outline: none;
            transition: border-color var(--transition);
        }
        .auth-field input:focus { border-color: rgba(107,138,253,0.5); }
        .auth-field input::placeholder { color: var(--text-3); }
        .auth-error {
            font-size: 0.78rem;
            color: var(--danger);
            background: rgba(240,80,80,0.08);
            border: 1px solid rgba(240,80,80,0.2);
            border-radius: 8px;
            padding: 8px 12px;
            margin-bottom: 12px;
            display: none;
        }
        .auth-error.show { display: block; }
        .auth-btn {
            width: 100%; padding: 11px;
            background: var(--accent);
            border: none; border-radius: var(--radius-sm);
            color: #fff;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.88rem; font-weight: 500;
            cursor: pointer;
            transition: opacity var(--transition), transform var(--transition);
            margin-top: 4px;
        }
        .auth-btn:hover { opacity: 0.88; }
        .auth-btn:active { transform: scale(0.98); }

        /* ── APP ─────────────────────────────────────── */
        .app {
            width: 100%;
            max-width: 1080px;
            height: 88vh;
            display: flex;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            overflow: hidden;
        }

        /* ── SIDEBAR ─────────────────────────────────── */
        .sidebar {
            width: 300px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--border);
        }

        .sidebar-top {
            padding: 20px 18px 14px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
        }
        .app-wordmark {
            font-family: 'DM Mono', monospace;
            font-size: 1rem;
            color: var(--text);
            letter-spacing: -0.3px;
        }
        .app-wordmark span { color: var(--accent); }

        .icon-btn {
            width: 32px; height: 32px;
            background: transparent;
            border: none;
            border-radius: 8px;
            color: var(--text-2);
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all var(--transition);
        }
        .icon-btn:hover { color: var(--text); background: var(--surface3); }
        .icon-btn svg { fill: currentColor; }

        .search-wrap {
            padding: 12px 14px;
            border-bottom: 1px solid var(--border);
        }
        .search-wrap input {
            width: 100%;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 9px 12px;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 0.82rem;
            outline: none;
            transition: border-color var(--transition);
        }
        .search-wrap input:focus { border-color: var(--border-hover); }
        .search-wrap input::placeholder { color: var(--text-3); }

        .chats-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        .chats-list::-webkit-scrollbar { width: 3px; }
        .chats-list::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 4px; }

        .chat-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 12px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: background var(--transition);
            position: relative;
        }
        .chat-item:hover { background: var(--surface2); }
        .chat-item.active { background: var(--accent-dim); }
        .chat-item:hover .del-btn { opacity: 1; }

        .chat-ava {
            width: 38px; height: 38px;
            border-radius: 50%;
            background: var(--surface3);
            display: flex; align-items: center; justify-content: center;
            font-size: 1rem;
            flex-shrink: 0;
        }
        .chat-item.active .chat-ava {
            background: var(--accent-dim);
        }

        .chat-body { flex: 1; overflow: hidden; }
        .chat-name {
            font-size: 0.88rem;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: var(--text);
        }
        .chat-preview {
            font-size: 0.75rem;
            color: var(--text-2);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-top: 2px;
        }

        .chat-meta-right {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 5px;
            flex-shrink: 0;
        }
        .chat-time { font-size: 0.7rem; color: var(--text-3); }
        .unread-dot {
            width: 18px; height: 18px;
            background: var(--accent);
            border-radius: 50%;
            font-size: 0.65rem;
            color: #fff;
            display: flex; align-items: center; justify-content: center;
            font-weight: 600;
        }

        .del-btn {
            position: absolute; right: 10px;
            background: transparent; border: none;
            color: var(--text-3); cursor: pointer;
            opacity: 0;
            transition: opacity var(--transition), color var(--transition);
            font-size: 0.7rem;
            display: flex; align-items: center;
        }
        .del-btn:hover { color: var(--danger); }
        .del-btn svg { fill: currentColor; width: 13px; height: 13px; }

        .user-bar {
            padding: 12px 14px;
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .user-ava {
            width: 34px; height: 34px;
            border-radius: 50%;
            background: var(--accent-dim);
            border: 1px solid var(--accent-glow);
            display: flex; align-items: center; justify-content: center;
            font-size: 0.85rem;
            flex-shrink: 0;
            overflow: hidden;
            position: relative;
        }
        .user-ava img { width: 100%; height: 100%; object-fit: cover; }
        .status-ring {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: var(--green);
            position: absolute; bottom: 0; right: 0;
            border: 2px solid var(--surface);
        }
        .status-ring.offline { background: var(--text-3); }

        .user-details { flex: 1; overflow: hidden; }
        .user-name { font-size: 0.85rem; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .user-tag { font-size: 0.7rem; color: var(--text-2); font-family: 'DM Mono', monospace; }

        /* ── CHAT PANEL ──────────────────────────────── */
        .chat-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .chat-header {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .chat-header-left { display: flex; align-items: center; gap: 10px; }
        .chat-header-ava {
            width: 34px; height: 34px;
            border-radius: 50%;
            background: var(--surface3);
            display: flex; align-items: center; justify-content: center;
            font-size: 0.95rem;
        }
        .chat-header-name { font-size: 0.95rem; font-weight: 500; }
        .chat-header-sub { font-size: 0.72rem; color: var(--text-2); margin-top: 1px; }
        .chat-header-actions { display: flex; gap: 4px; }

        .msg-search-input {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 7px 11px;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 0.78rem;
            outline: none;
            width: 110px;
            transition: width 0.25s ease, border-color var(--transition);
        }
        .msg-search-input:focus { width: 160px; border-color: var(--border-hover); }
        .msg-search-input::placeholder { color: var(--text-3); }

        .pinned-bar {
            padding: 8px 20px;
            background: var(--surface2);
            border-bottom: 1px solid var(--border);
            display: none;
            align-items: center;
            gap: 10px;
            font-size: 0.78rem;
            color: var(--text-2);
        }
        .pinned-bar.visible { display: flex; }
        .pinned-bar-line { width: 2px; height: 24px; background: var(--accent); border-radius: 2px; }
        .pinned-text { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            scroll-behavior: smooth;
        }
        .messages-area::-webkit-scrollbar { width: 3px; }
        .messages-area::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 4px; }

        .msg {
            max-width: 68%;
            display: flex;
            flex-direction: column;
            gap: 4px;
            position: relative;
            animation: msgIn 0.2s ease forwards;
        }
        @keyframes msgIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }


        .msg-sender {
            font-size: 0.7rem;
            font-weight: 500;
            color: var(--accent);
            margin-bottom: 3px;
            padding-left: 2px;
        }
        .msg.sent { align-self: flex-end; align-items: flex-end; }
        .msg.received { align-self: flex-start; align-items: flex-start; }

        .msg-bubble {
            padding: 10px 14px;
            border-radius: 14px;
            font-size: 0.88rem;
            line-height: 1.55;
            word-break: break-word;
            position: relative;
        }
        .msg.sent .msg-bubble {
            background: var(--sent-bg);
            color: #fff;
            border-bottom-right-radius: 4px;
        }
        .msg.received .msg-bubble {
            background: var(--received-bg);
            color: var(--text);
            border: 1px solid var(--border);
            border-bottom-left-radius: 4px;
        }
        .msg-bubble img {
            max-width: 220px;
            border-radius: 10px;
            display: block;
            cursor: pointer;
        }

        .msg-time {
            font-size: 0.65rem;
            color: var(--text-3);
            font-family: 'DM Mono', monospace;
        }
        .msg.sent .msg-time { text-align: right; }
        .msg-edited { font-size: 0.6rem; color: var(--text-3); }

        .reactions { display: flex; gap: 4px; flex-wrap: wrap; }
        .react-chip {
            background: var(--surface3);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 2px 7px;
            font-size: 0.72rem;
            cursor: pointer;
            transition: background var(--transition);
        }
        .react-chip:hover { background: var(--surface2); }

        .msg-actions {
            position: absolute;
            top: -30px;
            background: var(--surface3);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 4px 6px;
            display: flex;
            gap: 2px;
            opacity: 0;
            pointer-events: none;
            transition: opacity var(--transition);
            z-index: 5;
            white-space: nowrap;
        }
        .msg.sent .msg-actions { right: 0; }
        .msg.received .msg-actions { left: 0; }
        .msg:hover .msg-actions { opacity: 1; pointer-events: auto; }

        .msg-act-btn {
            background: transparent;
            border: none;
            color: var(--text-2);
            cursor: pointer;
            padding: 3px 5px;
            border-radius: 5px;
            display: flex;
            align-items: center;
            font-size: 0.8rem;
            transition: all var(--transition);
        }
        .msg-act-btn:hover { color: var(--text); background: var(--surface2); }
        .msg-act-btn svg { fill: currentColor; width: 12px; height: 12px; }

        .typing-label {
            font-size: 0.75rem;
            color: var(--text-2);
            padding: 4px 20px;
            font-style: italic;
            display: none;
        }

        .edit-bar {
            padding: 8px 20px;
            background: var(--surface2);
            border-top: 1px solid var(--border);
            display: none;
            align-items: center;
            justify-content: space-between;
            font-size: 0.78rem;
            color: var(--accent);
        }
        .edit-bar.visible { display: flex; }

        .input-bar {
            padding: 12px 16px;
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .attach-lbl {
            width: 36px; height: 36px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            color: var(--text-2);
            flex-shrink: 0;
            transition: all var(--transition);
        }
        .attach-lbl:hover { color: var(--text); border-color: var(--border-hover); }
        .attach-lbl svg { fill: currentColor; width: 15px; height: 15px; }

        .msg-input {
            flex: 1;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 10px 14px;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 0.88rem;
            outline: none;
            transition: border-color var(--transition);
        }
        .msg-input:focus { border-color: var(--border-hover); }
        .msg-input::placeholder { color: var(--text-3); }

        .send-btn {
            width: 36px; height: 36px;
            background: var(--accent);
            border: none;
            border-radius: 10px;
            color: #fff;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
            transition: all var(--transition);
        }
        .send-btn:hover { opacity: 0.85; }
        .send-btn:active { transform: scale(0.94); }
        .send-btn svg { fill: white; width: 15px; height: 15px; }

        /* ── MODALS ──────────────────────────────────── */
        .overlay {
            position: absolute; inset: 0;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(8px);
            display: flex; align-items: center; justify-content: center;
            z-index: 50;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s ease;
        }
        .overlay.open { opacity: 1; pointer-events: auto; }

        .modal {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 24px;
            width: 340px;
            max-width: calc(100% - 40px);
            transform: translateY(-12px) scale(0.97);
            transition: transform 0.25s ease, opacity 0.25s ease;
            opacity: 0;
        }
        .overlay.open .modal { transform: none; opacity: 1; }

        .modal-head {
            font-size: 1rem;
            font-weight: 500;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .modal-close {
            background: transparent; border: none;
            color: var(--text-2); cursor: pointer;
            font-size: 1.1rem; line-height: 1;
            transition: color var(--transition);
        }
        .modal-close:hover { color: var(--text); }

        .field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
        .field label { font-size: 0.75rem; color: var(--text-2); }
        .field input, .field select {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 9px 12px;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 0.88rem;
            outline: none;
            transition: border-color var(--transition);
        }
        .field input:focus, .field select:focus { border-color: rgba(107,138,253,0.35); }
        .field select option { background: var(--surface2); }

        .primary-btn {
            width: 100%;
            padding: 11px;
            background: var(--accent);
            border: none;
            border-radius: var(--radius-sm);
            color: #fff;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.88rem;
            font-weight: 500;
            cursor: pointer;
            transition: opacity var(--transition);
        }
        .primary-btn:hover { opacity: 0.88; }

        .ghost-btn {
            background: transparent; border: none;
            color: var(--text-2); font-size: 0.8rem;
            cursor: pointer; display: block;
            margin: 12px auto 0;
            transition: color var(--transition);
        }
        .ghost-btn:hover { color: var(--text); }

        #lightboxOverlay { cursor: zoom-out; }
        #lightboxOverlay img {
            max-width: 88vw; max-height: 80vh;
            border-radius: 12px;
        }

        /* ── EMPTY STATE ─────────────────────────────── */
        .empty-state {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
            color: var(--text-3);
            font-size: 0.85rem;
        }
        .empty-icon { font-size: 2.5rem; margin-bottom: 6px; }

        /* ── THEME DOTS ──────────────────────────────── */
        .color-row { display: flex; gap: 8px; }
        .cdot {
            width: 28px; height: 28px;
            border-radius: 8px; cursor: pointer;
            border: 2px solid transparent;
            transition: border-color var(--transition), transform var(--transition);
        }
        .cdot:hover { transform: scale(1.1); }
        .cdot.sel { border-color: var(--text); }

        /* ── AVATAR PREVIEW ──────────────────────────── */
        #avatarPreview {
            width: 44px; height: 44px;
            border-radius: 50%;
            background: var(--surface3);
            display: flex; align-items: center; justify-content: center;
            font-size: 1.1rem;
            overflow: hidden;
        }
        #avatarPreview img { width: 100%; height: 100%; object-fit: cover; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        /* ── MSG SENDER WITH AVATAR ──────────────────── */
        .msg-sender-row {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 4px;
        }
        .msg-sender-ava {
            width: 22px; height: 22px;
            border-radius: 50%;
            background: var(--surface3);
            display: flex; align-items: center; justify-content: center;
            font-size: 11px;
            cursor: pointer;
            flex-shrink: 0;
            overflow: hidden;
            transition: opacity var(--transition);
        }
        .msg-sender-ava:hover { opacity: 0.8; }
        .msg-sender-ava img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
        .msg-sender-name {
            font-size: 0.72rem;
            font-weight: 500;
            color: var(--accent);
            cursor: pointer;
        }
        .msg-sender-name:hover { text-decoration: underline; }

        /* ── REPLY ───────────────────────────────────── */
        .reply-bar {
            padding: 7px 16px;
            background: var(--surface2);
            border-top: 1px solid var(--border);
            display: none;
            align-items: center;
            gap: 10px;
        }
        .reply-bar.visible { display: flex; }
        .reply-line { width: 2px; height: 28px; background: var(--accent); border-radius: 2px; flex-shrink: 0; }
        .reply-content { flex: 1; overflow: hidden; }
        .reply-author { font-size: 0.72rem; color: var(--accent); font-weight: 500; }
        .reply-text { font-size: 0.78rem; color: var(--text-2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .msg-reply-preview {
            background: var(--surface3);
            border-left: 2px solid var(--accent);
            border-radius: 6px;
            padding: 4px 8px;
            margin-bottom: 5px;
            font-size: 0.75rem;
            color: var(--text-2);
            cursor: pointer;
        }
        .msg-reply-preview .rp-author { color: var(--accent); font-weight: 500; margin-bottom: 1px; }

        /* ── USER PROFILE MODAL ──────────────────────── */
        .user-profile-ava {
            width: 64px; height: 64px;
            border-radius: 50%;
            background: var(--surface3);
            display: flex; align-items: center; justify-content: center;
            font-size: 1.8rem;
            margin: 0 auto 12px;
            overflow: hidden;
        }
        .user-profile-ava img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
        .user-profile-name { text-align: center; font-size: 1rem; font-weight: 500; margin-bottom: 3px; }
        .user-profile-tag { text-align: center; font-size: 0.78rem; color: var(--text-2); font-family: 'DM Mono', monospace; }

        /* ── PEOPLE SEARCH ───────────────────────────── */
        .people-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; max-height: 260px; overflow-y: auto; }
        .people-item {
            display: flex; align-items: center; gap: 10px;
            padding: 9px 12px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
            background: var(--surface2);
            cursor: pointer;
            transition: all var(--transition);
        }
        .people-item:hover { border-color: var(--accent); background: var(--accent-dim); }
        .people-ava {
            width: 36px; height: 36px; border-radius: 50%;
            background: var(--surface3);
            display: flex; align-items: center; justify-content: center;
            font-size: 1rem; flex-shrink: 0; overflow: hidden;
        }
        .people-ava img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
        .people-info { flex: 1; }
        .people-name { font-size: 0.88rem; font-weight: 500; }
        .people-tag { font-size: 0.72rem; color: var(--text-2); font-family: 'DM Mono', monospace; }

        /* ── REACTIONS PICKER ────────────────────────── */
        .react-picker {
            position: absolute;
            top: -44px;
            background: var(--surface3);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 5px 8px;
            display: none;
            gap: 4px;
            z-index: 10;
            white-space: nowrap;
        }
        .msg.sent .react-picker { right: 0; }
        .msg.received .react-picker { left: 0; }
        .react-picker.open { display: flex; }
        .react-opt { font-size: 1.1rem; cursor: pointer; padding: 2px 3px; border-radius: 4px; transition: transform 0.1s; }
        .react-opt:hover { transform: scale(1.3); }

        /* ── WALLPAPER ───────────────────────────────── */
        .messages-area.has-wallpaper {
            background-attachment: local;
            background-size: cover;
            background-position: center;
        }
        .messages-area.has-wallpaper .msg.received .msg-bubble {
            background: var(--surface);
            backdrop-filter: blur(8px);
        }
        .messages-area.has-wallpaper .msg.sent .msg-bubble {
            box-shadow: 0 2px 8px rgba(0,0,0,0.25);
        }

        /* ── WALLPAPER PICKER ────────────────────────── */
        .wp-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-bottom: 16px;
        }
        .wp-thumb {
            width: 100%;
            aspect-ratio: 16/10;
            border-radius: 10px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all var(--transition);
            position: relative;
            overflow: hidden;
        }
        .wp-thumb:hover { transform: scale(1.04); border-color: var(--border-hover); }
        .wp-thumb.sel { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-dim); }
        .wp-thumb .wp-label {
            position: absolute; bottom: 0; left: 0; right: 0;
            font-size: 0.6rem; text-align: center;
            padding: 3px;
            background: rgba(0,0,0,0.45);
            color: #fff;
            border-radius: 0 0 8px 8px;
        }
        .wp-none {
            background: var(--surface2);
            display: flex; align-items: center; justify-content: center;
            font-size: 0.75rem; color: var(--text-2);
        }

        /* ── LANGUAGE PICKER ─────────────────────────── */
        .lang-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 16px;
        }
        .lang-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 14px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
            background: var(--surface2);
            cursor: pointer;
            transition: all var(--transition);
        }
        .lang-item:hover { border-color: var(--border-hover); }
        .lang-item.sel { border-color: var(--accent); background: var(--accent-dim); }
        .lang-flag { font-size: 1.2rem; }
        .lang-name { font-size: 0.88rem; font-weight: 500; }
        .lang-native { font-size: 0.72rem; color: var(--text-2); }
        .lang-check { margin-left: auto; color: var(--accent); display: none; }
        .lang-item.sel .lang-check { display: block; }

        /* ── CHAR COUNTER ─────────────────────────── */
        .char-counter {
            font-size: 0.68rem;
            color: var(--text-3);
            font-family: 'DM Mono', monospace;
            padding: 0 4px;
            transition: color var(--transition);
            white-space: nowrap;
        }
        .char-counter.warn { color: #f59f00; }
        .char-counter.limit { color: var(--danger); }

        /* ── QUICK REPLIES ────────────────────────── */
        .quick-replies {
            padding: 8px 16px 0;
            display: flex;
            gap: 6px;
            flex-wrap: nowrap;
            overflow-x: auto;
            scrollbar-width: none;
        }
        .quick-replies::-webkit-scrollbar { display: none; }
        .qr-chip {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 5px 12px;
            font-size: 0.75rem;
            color: var(--text-2);
            cursor: pointer;
            white-space: nowrap;
            flex-shrink: 0;
            transition: all var(--transition);
        }
        .qr-chip:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }

        /* ── STATS MODAL ──────────────────────────── */
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 18px;
        }
        .stat-card {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 14px;
            text-align: center;
        }
        .stat-val {
            font-size: 1.6rem;
            font-weight: 500;
            color: var(--accent);
            font-family: 'DM Mono', monospace;
            line-height: 1;
            margin-bottom: 4px;
        }
        .stat-lbl { font-size: 0.72rem; color: var(--text-2); }

        /* ── TOAST ────────────────────────────────── */
        .toast {
            position: fixed;
            bottom: 24px; left: 50%;
            transform: translateX(-50%) translateY(60px);
            background: var(--surface3);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 10px 18px;
            font-size: 0.82rem;
            color: var(--text);
            z-index: 9999;
            opacity: 0;
            transition: transform 0.3s ease, opacity 0.3s ease;
            pointer-events: none;
            white-space: nowrap;
        }
        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

    </style>
</head>

<script>
    // ── ПОДКЛЮЧЕНИЕ К СЕРВЕРУ ─────────────────────
let ws;
let useServer = false; // переключим в true когда сервер ответит

function connectToServer() {
  // Пробуем загрузить чаты с сервера
  fetch('/api/chats')
    .then(r => r.json())
    .then(serverChats => {
      if (!serverChats.length) return;
      useServer = true;

      // Конвертируем формат сервера в формат нашего приложения
      serverChats.forEach(c => {
        chats[String(c.id)] = {
          name: c.name,
          avatar: c.avatar || '💬',
          type: c.type || 'Чат',
          unread: 0,
          updated: Date.now(),
          pinned: null,
          messages: []
        };
      });

      // Загружаем сообщения первого чата
      const firstId = String(serverChats[0].id);
      fetch('/api/messages/' + firstId)
        .then(r => r.json())
        .then(msgs => {
          msgs.forEach(m => {
            chats[firstId].messages.push({
              id: m.id,
              text: m.text,
              type: m.is_sent ? 'sent' : 'received',
              time: m.time || '00:00'
            });
          });
          renderChats();
          switchChat(firstId);
        });

      // Подключаем WebSocket для живых сообщений
      connectWS();
    })
    .catch(() => {
      // Сервер недоступен — работаем локально как раньше
      console.log('Сервер недоступен, работаем локально');
    });
}

function connectWS() {
  const proto = location.protocol === 'https:' ? 'wss://' : 'ws://';
  ws = new WebSocket(proto + location.host);

  ws.onopen = () => console.log('WebSocket подключён');

  ws.onmessage = (e) => {
    const data = JSON.parse(e.data);
    if (data.type === 'message') {
      const m = data.msg;
      const cid = String(m.chat_id);
      if (!chats[cid]) return;

      const isMine = m.sender === currentUsername;

      if (isMine) {
        // Заменяем временное сообщение на подтверждённое с сервера
        const tmpIdx = chats[cid].messages.findIndex(x => x.id === m.tmpId);
        if (tmpIdx !== -1) {
          chats[cid].messages[tmpIdx].id = m.id;
        } else {
          // На случай если tmpId не совпал — проверяем дубликат по id
          const exists = chats[cid].messages.find(x => x.id === m.id);
          if (!exists) {
            chats[cid].messages.push({
              id: m.id, text: m.text,
              type: 'sent', time: m.time,
              sender: m.sender
            });
          }
        }
      } else {
        // Чужое сообщение — просто добавляем
        const exists = chats[cid].messages.find(x => x.id === m.id);
        if (!exists) {
          chats[cid].messages.push({
            id: m.id, text: m.text,
            type: 'received', time: m.time,
            sender: m.sender, replyTo: m.replyTo || null
          });
        }
      }

      if (cid === activeId) {
        renderMsgs(); // re-render only affected chat
      } else {
        chats[cid].unread = (chats[cid].unread || 0) + 1;
      }
      chats[cid].updated = Date.now();
      renderChats();
    }
  };

  ws.onclose = () => {
    // Переподключаемся через 3 сек если соединение упало
    setTimeout(connectWS, 3000);
  };
}
// ── STORAGE HELPERS ──────────────────────────────────────
// Safe storage — falls back to memory if localStorage blocked
const _mem = {};
const Store = {
    get: k => {
        try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : null; }
        catch { return _mem[k] || null; }
    },
    set: (k, v) => {
        try { localStorage.setItem(k, JSON.stringify(v)); }
        catch { _mem[k] = v; }
    },
    del: k => {
        try { localStorage.removeItem(k); }
        catch { delete _mem[k]; }
    }
};

// ── AUTH ─────────────────────────────────────────────────
function getUsers() { return Store.get('void_users') || {}; }
function saveUsers(u) { Store.set('void_users', u); }
function currentUser() { return Store.get('void_session'); }

function setTab(tab) {
    const isLogin = tab === 'login';
    document.getElementById('formLogin').style.display = isLogin ? 'block' : 'none';
    document.getElementById('formReg').style.display   = isLogin ? 'none'  : 'block';
    document.getElementById('tabLogin').classList.toggle('active', isLogin);
    document.getElementById('tabReg').classList.toggle('active', !isLogin);
    clearAuthError();
    // Очищаем все поля при переключении вкладок
    ['loginUser','loginPass','regName','regUser','regPass','regPass2'].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.value = '';
    });
}

function showAuthError(msg) {
    const el = document.getElementById('authError');
    el.textContent = msg;
    el.classList.add('show');
}
function clearAuthError() {
    document.getElementById('authError').classList.remove('show');
}

function doLogin() {
    clearAuthError();
    const user = document.getElementById('loginUser').value.trim().toLowerCase();
    const pass = document.getElementById('loginPass').value;
    if (!user || !pass) return showAuthError('Заполните все поля');
    const freshUsers = getUsers();
    if (!freshUsers[user]) return showAuthError('Пользователь не найден');
    if (freshUsers[user].password !== btoa(unescape(encodeURIComponent(pass)))) return showAuthError('Неверный пароль');
    Store.set('void_session', user);
    enterApp(user, freshUsers[user]);
}

function doRegister() {
    clearAuthError();
    const name  = document.getElementById('regName').value.trim();
    const user  = document.getElementById('regUser').value.trim().toLowerCase();
    const pass  = document.getElementById('regPass').value;
    const pass2 = document.getElementById('regPass2').value;
    if (!name || !user || !pass) return showAuthError('Заполните все поля');
    if (pass.length < 6) return showAuthError('Пароль минимум 6 символов');
    if (pass !== pass2) return showAuthError('Пароли не совпадают');
    if (!/^[a-zа-я0-9_]+$/i.test(user)) return showAuthError('Только буквы, цифры и _');
    // Всегда читаем свежие данные из хранилища
    const freshUsers = getUsers();
    if (freshUsers[user]) return showAuthError('Имя пользователя занято');
    freshUsers[user] = { name, password: btoa(unescape(encodeURIComponent(pass))), status: 'online', accent: '#6b8afd' };
    saveUsers(freshUsers);
    Store.set('void_session', user);
    enterApp(user, freshUsers[user]);
}

function enterApp(username, userData) {
    const screen = document.getElementById('authScreen');
    screen.classList.add('fade-out');
    setTimeout(() => { screen.style.display = 'none'; }, 350);
    document.getElementById('app').style.display = 'flex';
    initApp(username, userData);
    connectToServer();
}

function logout() {
    Store.del('void_session');
    location.reload();
}





// ── STATE ────────────────────────────────────────────────
let chats = {};
let activeId = null;
let editingId = null;
let replyingTo = null;
let tempAva = null;
let currentUsername = null;

function initApp(username, userData) {
    currentUsername = username;
    const key = `void_chats_${username}`;
    chats = Store.get(key) || {
        '1': { name: 'Избранное', avatar: '🌟', type: 'Заметки', isSystem: true, unread: 0, updated: Date.now(), pinned: null,
               messages: [{ id: 1, type: 'received', text: 'Привет! Это твоё личное пространство для заметок.', time: now() }] },
        '2': { name: 'Основной чат', avatar: '💬', type: 'Чат', unread: 1, updated: Date.now() - 1000, pinned: null,
               messages: [{ id: 2, type: 'received', text: 'Добро пожаловать в void. Начни переписку.', time: now() }] }
    };

    // Update user bar
    document.getElementById('userNameEl').textContent = userData.name;
    document.getElementById('userTagEl').textContent = '@' + username;
    applyAccent(userData.accent || '#6b8afd');
    if (userData.status === 'offline') document.getElementById('statusRing').classList.add('offline');

    // ensure keys are strings
    const fixedChats = {};
    Object.entries(chats).forEach(([k, v]) => { fixedChats[String(k)] = v; });
    chats = fixedChats;

    renderChats();
    // pick first available chat
    const firstKey = Object.keys(chats).sort((a,b) => (chats[b].updated||0)-(chats[a].updated||0))[0] || '2';
    switchChat(firstKey);
    saveChats();

    renderQuickReplies();
    requestNotifPerms();
    currentLang = localStorage.getItem('void_lang') || 'ru';
    applyTranslations();

    // Enter on input (only bind once)
    const mi = document.getElementById('msgInput');
    mi.replaceWith(mi.cloneNode(true));
    document.getElementById('msgInput').addEventListener('keydown', e => {
        if (e.key === 'Enter') sendMsg();
    });
}

function now() {
    return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}
function saveChats() {
    Store.set(`void_chats_${currentUsername}`, chats);
}

// ── CHATS LIST ───────────────────────────────────────────
function renderChats(filter = '') {
    const list = document.getElementById('chatsList');
    list.innerHTML = '';
    const sorted = Object.entries(chats)
        .sort((a, b) => b[1].updated - a[1].updated);

    sorted.forEach(([id, c]) => {
        if (filter && !c.name.toLowerCase().includes(filter.toLowerCase())) return;
        const last = c.messages[c.messages.length - 1];
        const preview = last ? (last.isFile ? '📎 Изображение' : last.text) : 'Нет сообщений';
        const div = document.createElement('div');
        div.className = 'chat-item' + (id == activeId ? ' active' : '');
        div.innerHTML = `
            <div class="chat-ava">${c.avatar}</div>
            <div class="chat-body">
                <div class="chat-name">${c.name}</div>
                <div class="chat-preview">${preview}</div>
            </div>
            <div class="chat-meta-right">
                <div class="chat-time">${last ? last.time : ''}</div>
                ${c.unread > 0 ? `<div class="unread-dot">${c.unread}</div>` : ''}
            </div>
            ${!c.isSystem ? `<button class="del-btn" onclick="delChat(${id},event)" title="Удалить">
                <svg viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
            </button>` : ''}
        `;
        div.addEventListener('click', () => switchChat(id));
        list.appendChild(div);
    });
}
function filterChats() { renderChats(document.getElementById('chatSearch').value); }

// ── SWITCH CHAT ──────────────────────────────────────────
function switchChat(id) {
    id = String(id);
    if (!chats[id]) {
        // fallback to first available chat
        const keys = Object.keys(chats);
        if (!keys.length) return;
        id = keys[0];
    }
    activeId = id;
    const c = chats[id];
    c.unread = 0;
    cancelEdit();

    document.getElementById('emptyState').style.display = 'none';
    const cv = document.getElementById('chatView');
    cv.style.cssText = 'display:flex;flex-direction:column;flex:1;min-height:0;';

    document.getElementById('hdrAva').textContent = c.avatar;
    document.getElementById('hdrName').textContent = c.name;
    document.getElementById('hdrSub').textContent = c.type;

    const pb = document.getElementById('pinnedBar');
    if (c.pinned) {
        document.getElementById('pinnedText').textContent = '📌 ' + c.pinned;
        pb.classList.add('visible');
    } else {
        pb.classList.remove('visible');
    }

    document.getElementById('msgSearch').value = '';
    applyWallpaperToArea(c.wallpaper || 'none');
    renderMsgs();
    renderChats();
    saveChats();
}

// ── MESSAGES ─────────────────────────────────────────────
function renderMsgs(filter = '') {
    const area = document.getElementById('messagesArea');
    area.innerHTML = '';
    if (!chats[activeId]) return;
    chats[activeId].messages.forEach(m => {
        if (filter && !m.text?.toLowerCase().includes(filter)) return;
        const div = document.createElement('div');
        div.className = 'msg ' + m.type;

        const reactions = m.reactions ? Object.entries(m.reactions)
            .filter(([,v]) => v > 0)
            .map(([k, v]) => `<span class="react-chip" onclick="react(${m.id},'${k}')">${k} ${v}</span>`)
            .join('') : '';

        const body = m.isFile
            ? `<img src="${m.fileData}" onclick="openLightbox('${m.fileData}')">`
            : m.text || '';

        const editBtn = m.type === 'sent'
            ? `<button class="msg-act-btn" onclick="startEdit(${m.id},'${(m.text||'').replace(/'/g,"\\'")}')">
                <svg viewBox="0 0 24 24"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>
               </button>` : '';

        div.innerHTML = `
            <div class="msg-actions">
                <button class="msg-act-btn" onclick="react(${m.id},'👍')">👍</button>
                <button class="msg-act-btn" onclick="react(${m.id},'❤️')">❤️</button>
                <button class="msg-act-btn" onclick="react(${m.id},'😂')">😂</button>
                <button class="msg-act-btn" onclick="copyMsg('${(m.text||'').replace(/'/g,"\\'")}')">
                    <svg viewBox="0 0 24 24"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>
                </button>
                <button class="msg-act-btn" onclick="pinMsg('${(m.text||'Изображение').replace(/'/g,"\\'")}')">
                    <svg viewBox="0 0 24 24"><path d="M16 12V4h1V2H7v2h1v8l-2 2v2h5.2v6l1.8 1.8L14.8 18v-4H20v-2l-4-4z"/></svg>
                </button>
                ${editBtn}
                <button class="msg-act-btn" onclick="delMsg(${m.id})">
                    <svg viewBox="0 0 24 24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>
                </button>
            </div>

            <div class="msg-bubble">${body}</div>
            ${reactions ? `<div class="reactions">${reactions}</div>` : ''}
            <div class="msg-time">${m.time}${m.edited ? ' · изм.' : ''}</div>
        `;
        area.appendChild(div);
    });
    requestAnimationFrame(() => { area.scrollTop = area.scrollHeight; });
}
function filterMsgs() { renderMsgs(document.getElementById('msgSearch').value.toLowerCase()); }

function sendMsg() {
    const input = document.getElementById('msgInput');
    const text = input.value.trim();
    if (!text) return;

    if (editingId !== null) {
        const m = chats[activeId].messages.find(x => x.id === editingId);
        if (m) { m.text = text; m.edited = true; }
        cancelEdit();
    } else {
        const tmpId = Date.now();
        chats[activeId].updated = Date.now();
        if (useServer && ws && ws.readyState === 1) {
            // Сервер подключён — добавляем локально сразу, сервер подтвердит через broadcast
            chats[activeId].messages.push({ id: tmpId, type: 'sent', text, time: now(), sender: currentUsername, replyTo: replyingTo });
            ws.send(JSON.stringify({
                type: 'message',
                chat_id: Number(activeId),
                text: text,
                is_sent: true,
                time: now(),
                sender: currentUsername,
                tmpId: tmpId,
                replyTo: replyingTo
            }));
        } else {
            chats[activeId].messages.push({ id: tmpId, type: 'sent', text, time: now(), replyTo: replyingTo });
            botReply();
        }
        cancelReply();
    }
    input.value = '';
    renderMsgs();
    renderChats();
    saveChats();
}

function botReply() {
    const tid = activeId;
    document.getElementById('typingLabel').style.display = 'block';
    setTimeout(() => {
        document.getElementById('typingLabel').style.display = 'none';
        if (!chats[tid]) return;
        const botText = 'Системный ответ…';
        chats[tid].messages.push({ id: Date.now(), type: 'received', text: botText, time: now() });
        chats[tid].updated = Date.now();
        if (tid != activeId) { chats[tid].unread += 1; sendNotification(chats[tid].name, botText); }
        renderMsgs();
        renderChats();
        saveChats();
    }, 1100);
}

function react(id, emoji) {
    const m = chats[activeId].messages.find(x => x.id === id);
    if (!m) return;
    if (!m.reactions) m.reactions = {};
    m.reactions[emoji] = (m.reactions[emoji] || 0) + 1;
    renderMsgs();
    saveChats();
}
function pinMsg(text) {
    chats[activeId].pinned = text;
    document.getElementById('pinnedText').textContent = '📌 ' + text;
    document.getElementById('pinnedBar').classList.add('visible');
    saveChats();
}
function unpin() {
    chats[activeId].pinned = null;
    document.getElementById('pinnedBar').classList.remove('visible');
    saveChats();
}
function delMsg(id) {
    chats[activeId].messages = chats[activeId].messages.filter(x => x.id !== id);
    renderMsgs();
    renderChats();
    saveChats();
}
function startEdit(id, text) {
    editingId = id;
    document.getElementById('editBar').classList.add('visible');
    document.getElementById('msgInput').value = text;
    document.getElementById('msgInput').focus();
}
function cancelEdit() {
    editingId = null;
    document.getElementById('editBar').classList.remove('visible');
    document.getElementById('msgInput').value = '';
}
function clearHistory() {
    if (!confirm('Очистить историю чата?')) return;
    chats[activeId].messages = [];
    unpin();
    renderMsgs();
    renderChats();
    saveChats();
}
function attachFile(input) {
    const file = input.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = e => {
        chats[activeId].messages.push({ id: Date.now(), type: 'sent', time: now(), fileData: e.target.result, isFile: true });
        chats[activeId].updated = Date.now();
        renderMsgs();
        renderChats();
        saveChats();
    };
    reader.readAsDataURL(file);
}
function openLightbox(src) {
    document.getElementById('lightboxImg').src = src;
    openOverlay('lightboxOverlay');
}

// ── CHATS CRUD ───────────────────────────────────────────
function createChat() {
    const name = document.getElementById('newName').value.trim();
    if (!name) return;
    const id = Date.now();
    chats[id] = {
        name,
        avatar: document.getElementById('newEmoji').value.trim() || '💬',
        type: document.getElementById('newType').value,
        unread: 0, updated: Date.now(), pinned: null,
        messages: [{ id: Date.now(), type: 'received', text: `Пространство "${name}" создано.`, time: now() }]
    };
    document.getElementById('newName').value = '';
    closeOverlay('createOverlay');
    switchChat(id);
    saveChats();
}
function delChat(id, e) {
    e.stopPropagation();
    id = String(id);
    if (!confirm('Удалить чат?')) return;
    delete chats[id];
    if (activeId == id) {
        const keys = Object.keys(chats);
        if (keys.length) switchChat(keys[0]);
        else {
            activeId = null;
            document.getElementById('chatView').style.display = 'none';
            document.getElementById('emptyState').style.display = 'flex';
        }
    }
    renderChats();
    saveChats();
}

        ring.className = 'status-ring' + (u.status === 'offline' ? ' offline' : '');

function pickAccent(color, el) {
    document.querySelectorAll('.cdot').forEach(d => d.classList.remove('sel'));
    el.classList.add('sel');
    applyAccent(color);
    const users = getUsers();
    users[currentUsername].accent = color;
    saveUsers(users);
}
function applyAccent(color) {
    document.documentElement.style.setProperty('--accent', color);
    const rgb = hexToRgb(color);
    if (rgb) {
        document.documentElement.style.setProperty('--accent-dim', `rgba(${rgb},0.12)`);
        document.documentElement.style.setProperty('--accent-glow', `rgba(${rgb},0.22)`);
        document.documentElement.style.setProperty('--sent-bg', color);
    }
}
function hexToRgb(hex) {
    const r = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
    return r ? `${parseInt(r[1],16)},${parseInt(r[2],16)},${parseInt(r[3],16)}` : null;
}

function searchPeople(q) {
    const list = document.getElementById('peopleList');
    const users = getUsers();
    const results = Object.entries(users).filter(([un, u]) =>
        un !== currentUsername && (
            un.toLowerCase().includes(q.toLowerCase()) ||
            (u.name||'').toLowerCase().includes(q.toLowerCase())
        )
    );
    if (!q.trim()) {
        list.innerHTML = '<div style="font-size:0.8rem;color:var(--text-3);text-align:center;padding:16px;">Начните вводить юзернейм</div>';
        return;
    }
    if (!results.length) {
        list.innerHTML = '<div style="font-size:0.8rem;color:var(--text-3);text-align:center;padding:16px;">Никого не найдено</div>';
        return;
    }
    list.innerHTML = results.map(([un, u]) => {
        const avaHtml = u.avatar ? `<img src="${u.avatar}">` : (u.name||un)[0].toUpperCase();
        return `<div class="people-item" onclick="openUserProfile('${un}')">
            <div class="people-ava">${avaHtml}</div>
            <div class="people-info">
                <div class="people-name">${u.name || un}</div>
                <div class="people-tag">@${un}</div>
            </div>
        </div>`;
    }).join('');
}

// ── STATS ─────────────────────────────────────────────────
function openStatsModal() {
    const c = chats[activeId];
    if (!c) return;
    const msgs = c.messages;
    const sent = msgs.filter(m => m.type === 'sent').length;
    const received = msgs.filter(m => m.type === 'received').length;
    const files = msgs.filter(m => m.isFile).length;
    const totalReacts = msgs.reduce((acc, m) => {
        if (m.reactions) acc += Object.values(m.reactions).reduce((s, v) => s + v, 0);
        return acc;
    }, 0);
    const grid = document.getElementById('statsGrid');
    grid.innerHTML = [
        [msgs.length, 'Сообщений'],
        [sent, 'Отправлено'],
        [received, 'Получено'],
        [files, 'Файлов'],
        [totalReacts, 'Реакций'],
        [c.pinned ? 1 : 0, 'Закреплено']
    ].map(([v, l]) => `<div class="stat-card"><div class="stat-val">${v}</div><div class="stat-lbl">${l}</div></div>`).join('');
    openOverlay('statsOverlay');
}

// ── EXPORT ───────────────────────────────────────────────
function exportChat() {
    const c = chats[activeId];
    if (!c) return;
    const lines = [`Чат: ${c.name}`, `Экспорт: ${new Date().toLocaleString()}`, '─'.repeat(40)];
    c.messages.forEach(m => {
        if (m.isFile) lines.push(`[${m.time}] 📎 Изображение`);
        else lines.push(`[${m.time}] ${m.type === 'sent' ? '▶' : '◀'} ${m.text}`);
    });
    const blob = new Blob([lines.join('\n')], { type: 'text/plain;charset=utf-8' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `${c.name.replace(/[^a-zа-я0-9]/gi,'_')}.txt`;
    a.click();
    showToast('📥 Чат сохранён');
    closeOverlay('statsOverlay');
}

    updateThemeIcon(savedTheme === 'light');

    const session = currentUser();

    if (session && users[session]) {
        // Уже залогинен — входим сразу
        document.getElementById('authScreen').style.display = 'none';
        document.getElementById('app').style.display = 'flex';
        initApp(session, users[session]);
        connectToServer();
         // Пробуем подключиться к серверу
    connectToServer();
    } else {
        // Показываем экран входа
        document.getElementById('authScreen').style.display = 'flex';
        document.getElementById('app').style.display = 'none';
        // Enter key support
        document.getElementById('loginPass').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
        document.getElementById('loginUser').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
        document.getElementById('regPass2').addEventListener('keydown', e => { if (e.key === 'Enter') doRegister(); });
    }
});
</script>
